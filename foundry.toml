[profile.default]
src = "src"
out = "out"
libs = ["lib"]
script = "script"
test = "test"
solc_version = "0.8.34"
optimizer = true
optimizer_runs = 20_000
evm_version = "paris"
via_ir = true
ffi = false
fs_permissions = [{ access = "read", path = "./" }]

[fuzz]
runs = 1024

[invariant]
runs = 256
depth = 64
fail_on_revert = true
